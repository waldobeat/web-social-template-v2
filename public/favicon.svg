<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Bear face - brown background circle -->
  <circle cx="50" cy="50" r="45" fill="#8B4513"/>
  
  <!-- Bear ears -->
  <circle cx="20" cy="20" r="15" fill="#8B4513"/>
  <circle cx="80" cy="20" r="15" fill="#8B4513"/>
  <circle cx="20" cy="20" r="8" fill="#D2691E"/>
  <circle cx="80" cy="20" r="8" fill="#D2691E"/>
  
  <!-- Bear snout -->
  <ellipse cx="50" cy="60" rx="20" ry="15" fill="#D2691E"/>
  
  <!-- Bear nose -->
  <ellipse cx="50" cy="55" rx="8" ry="5" fill="#3D2314"/>
  
  <!-- Bear eyes -->
  <circle cx="35" cy="40" r="6" fill="#3D2314"/>
  <circle cx="65" cy="40" r="6" fill="#3D2314"/>
  <circle cx="37" cy="38" r="2" fill="white"/>
  <circle cx="67" cy="38" r="2" fill="white"/>
  
  <!-- Bear mouth -->
  <path d="M45 68 Q50 73 55 68" stroke="#3D2314" stroke-width="2" fill="none"/>
</svg>
